<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SLCC English App – QR Code</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:  #0a1628;
    --blue:  #1a3a6e;
    --sky:   #2563eb;
    --gold:  #f0a500;
    --cream: #f8f4ee;
    --white: #ffffff;
  }

  body {
    min-height: 100vh;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    padding: 2rem;
  }

  .card {
    background: var(--white);
    border-radius: 24px;
    box-shadow: 0 20px 60px rgba(10,22,40,0.14), 0 4px 12px rgba(10,22,40,0.08);
    overflow: hidden;
    width: 320px;
    animation: rise 0.6s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes rise {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%);
    padding: 26px 28px 22px;
    position: relative;
    overflow: hidden;
  }

  .header::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
  }

  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; left: 20px;
    width: 100px; height: 100px;
    border-radius: 50%;
    background: rgba(37,99,235,0.25);
  }

  .badge {
    display: inline-block;
    background: var(--gold);
    color: var(--navy);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 100px;
    margin-bottom: 12px;
  }

  .title {
    font-family: 'DM Serif Display', serif;
    font-size: 24px;
    color: var(--white);
    line-height: 1.2;
    position: relative;
    z-index: 1;
  }

  .title em {
    font-style: italic;
    color: #93c5fd;
  }

  .qr-wrap {
    padding: 28px 28px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .qr-frame {
    position: relative;
    padding: 14px;
    background: var(--white);
    border-radius: 16px;
    box-shadow: 0 0 0 1.5px rgba(10,22,40,0.08), 0 8px 24px rgba(10,22,40,0.10);
  }

  .qr-frame::before,
  .qr-frame::after {
    content: '';
    position: absolute;
    width: 22px; height: 22px;
    border-color: var(--sky);
    border-style: solid;
  }
  .qr-frame::before { top: 4px; left: 4px; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
  .qr-frame::after  { bottom: 4px; right: 4px; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

  #qrcode canvas, #qrcode img {
    display: block;
    border-radius: 4px;
  }

  .footer {
    border-top: 1px solid rgba(10,22,40,0.06);
    padding: 12px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-text {
    font-size: 11px;
    color: rgba(10,22,40,0.35);
    font-weight: 300;
  }

  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.2);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
    50%      { box-shadow: 0 0 0 6px rgba(34,197,94,0.08); }
  }
</style>
</head>
<body>

<div class="card">
  <div class="header">
    <div class="badge">Scan to Open</div>
    <div class="title">SLCC <em>English</em> App</div>
  </div>

  <div class="qr-wrap">
    <div class="qr-frame">
      <div id="qrcode"></div>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">SLCC English App · Web Version</span>
    <div class="dot"></div>
  </div>
</div>

<script>
  new QRCode(document.getElementById("qrcode"), {
    text: "https://jp169zx-gh.github.io/en/",
    width: 240,
    height: 240,
    colorDark: "#0a1628",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
